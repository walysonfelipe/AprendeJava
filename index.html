<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Open Graph Meta Tags -->
  <meta property="og:title" content="Plano de Estudos — Java">
  <meta property="og:description"
    content="Um plano de estudos completo com Java e Spring Boot, do zero até uma API em produção.">
  <meta property="og:image" content="https://java.walysondev.online/og.png">
  <meta property="og:type" content="website">

  <!-- Twitter Meta Tags -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Plano de Estudos — Java">
  <meta name="twitter:description"
    content="Um plano de estudos completo com Java e Spring Boot, do zero até uma API em produção.">
  <meta name="twitter:image" content="https://java.walysondev.online/og.png">

  <!-- Preload para evitar glitches/engasgos no loader via mobile -->
  <!-- Preload do GIF para acelerar o carregamento logo ao instanciar o site -->
  <link rel="preload" href="cats.webp" as="image">
  <link rel="preload" href="ads.png" as="image">

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div id="loader">
    <!-- Retornando ao GIF. Atributos para carregar super-rápido: fetchpriority, decoding async e eager loading. -->
    <img id="loader-logo" src="cats.webp" alt="Logo" fetchpriority="high" decoding="async" loading="eager">
    <div id="loader-bottom">
      <div id="loader-bar-track">
        <div id="loader-bar-fill"></div>
      </div>
      <span id="loader-percent">0%</span>
    </div>
  </div>

  <div class="plan">
    <h1>Plano de Estudos Java + Spring Boot(opcional)</h1>
    <p class="subtitle">Do zero até uma API em produção · ~12 a 17 semanas</p>
    <div class="progress-row" id="progress-row"></div>
    <div id="phases"></div>
  </div>

  <!-- YouTube Video Carousel (gerado via JS) -->
  <section class="video-carousel" id="video-carousel">
    <h2 class="carousel-title">🎬 Vídeos Recomendados</h2>
    <p class="carousel-subtitle">Aulas e playlists para complementar o estudo</p>

    <div class="carousel-wrapper">
      <button class="carousel-btn carousel-btn-prev" id="carousel-prev" aria-label="Anterior">&#10094;</button>
      <div class="carousel-track" id="carousel-track"></div>
      <button class="carousel-btn carousel-btn-next" id="carousel-next" aria-label="Próximo">&#10095;</button>
    </div>

    <div class="carousel-dots" id="carousel-dots"></div>
  </section>

  <footer class="site-footer">
    <img src="ads.png" alt="Java + Spring Boot Ad">
    <span class="site-footer-text">3 Semestre de ADS</span>
  </footer>

  <script>
    /* ======================================================
       ARRAY DE VÍDEOS — adicione quantos quiser aqui!
       Campos:
         url   → link do YouTube (vídeo direto ou playlist)
         nome  → nome do vídeo / playlist
         canal → nome do canal
       ====================================================== */
    const videos = [
      {
        url: "https://www.youtube.com/playlist?list=PLHz_AreHm4dkqe2aR0tQK74m8SFe-aGsY",
        nome: "Curso de POO Java (Programação Orientada a Objetos)",
        canal: "Curso em Vídeo"
      },
      {
        url: "https://www.youtube.com/watch?v=QY0Kdg83orY",
        nome: "Programação Orientada a Objetos (POO) // Dicionário do Programador",
        canal: "Código Fonte TV"
      },
      {
        url: "https://www.youtube.com/watch?v=QSgo8Yet-kc",
        nome: "#1 A FACULDADE ENSINOU ERRADO - POO",
        canal: "bero o dev"
      },
      {
        url: "https://www.youtube.com/watch?v=dXZRgW-X2ls&pp=ygUIcG9vIGphdmE%3D",
        nome: "Introdução à Programação Orientada a Objetos (POO): uma explicação fácil",
        canal: "Attekita Dev"
      },
      {
        url: "https://www.youtube.com/watch?v=8VcZkAYygoo",
        nome: "Introdução à Programação Orientada a Objetos (POO) Parte 2 - Polimorfismo e Encapsulamento",
        canal: "Attekita Dev"
      },
      {
        url: "https://www.youtube.com/playlist?list=PLGPluF_nhP9p6zWTN88ZJ1q9J_ZK148-f",
        nome: "Curso Java - Nível 1: Estruturado",
        canal: "Academia dos Devs"
      },
      {
        url: "https://www.youtube.com/playlist?list=PLGPluF_nhP9oNl6vAwapJNqkWA8_CxRuy",
        nome: "Curso Java - Nível 2: Orientado a Objetos na Prática",
        canal: "Academia dos Devs"
      },
      {
        url: "https://www.youtube.com/playlist?list=PLHz_AreHm4dkBs-795Dsgvau_ekxg8g1r",
        nome: "Curso de Banco de Dados MySQL",
        canal: "Curso em Vídeo"
      },
      {
        url: "https://www.youtube.com/watch?v=hwttZtWkXTk",
        nome: "HTTP // Dicionário do Programador",
        canal: "Código Fonte TV"
      },
      {
        url: "https://www.youtube.com/playlist?list=PLNCSWIsR6ADI_wMAx9F-Iu8Hs9HHxj4sb",
        nome: "Curso de JAVA + SPRING completo",
        canal: "Fernanda Kipper | Dev"
      },
      {
        url: "https://www.youtube.com/watch?v=v1zWMyYEOPw",
        nome: "O QUE É SPRING BOOT | Conceito, Vantagens e Como Funciona",
        canal: "Shaolin do Java"
      }
    ];

    function getYouTubeEmbedUrl(url) {
      try {
        const parsed = new URL(url);
        let videoId = parsed.searchParams.get('v');
        let playlistId = parsed.searchParams.get('list');

        if (parsed.hostname === 'youtu.be') {
          videoId = parsed.pathname.slice(1);
        }

        // O YouTube bloqueia (Erro 153) a exibição de playlists quando o arquivo
        // é aberto diretamente do computador (protocolo file://).
        // Se estiver local, removemos a playlist e tocamos apenas o vídeo atual.
        if (window.location.protocol === 'file:') {
          playlistId = null;
        }

        if (videoId && playlistId) {
          return `https://www.youtube.com/embed/${videoId}?list=${playlistId}`;
        } else if (playlistId) {
          return `https://www.youtube.com/embed/videoseries?list=${playlistId}`;
        } else if (videoId) {
          return `https://www.youtube.com/embed/${videoId}`;
        }
      } catch (e) {
        console.error("URL inválida:", url);
      }
      return url; // fallback
    }

    // Gera os slides e dots dinamicamente
    (function buildCarousel() {
      const track = document.getElementById('carousel-track');
      const dotsContainer = document.getElementById('carousel-dots');

      videos.forEach((v, i) => {
        const isPlaylist = v.url.includes('list=');
        const embedUrl = getYouTubeEmbedUrl(v.url);

        // Slide
        const slide = document.createElement('div');
        slide.className = 'carousel-slide' + (i === 0 ? ' active' : '');
        slide.innerHTML = `
          <div class="video-frame">
            <iframe
              src="${embedUrl}"
              title="${v.nome}"
              frameborder="0"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
              allowfullscreen>
            </iframe>
          </div>
          <div class="video-info">
            <span class="video-badge ${isPlaylist ? 'badge-purple' : 'badge-teal'}">${isPlaylist ? 'Playlist' : 'Vídeo'}</span>
            <span class="video-label">${v.canal} — ${v.nome}</span>
          </div>
        `;
        track.appendChild(slide);

        // Dot
        const dot = document.createElement('button');
        dot.className = 'carousel-dot' + (i === 0 ? ' active' : '');
        dot.dataset.index = i;
        dot.setAttribute('aria-label', `Slide ${i + 1}`);
        dotsContainer.appendChild(dot);
      });
    })();

    const phases = [
      {
        num: 1, badge: "badge-purple", label: "Fundamentos",
        title: "Java básico + POO", duration: "3–4 semanas",
        groups: [
          {
            label: "Sintaxe e Tipos", items: [
              "Tipos primitivos: int, double, boolean, char, long, float",
              "Tipos referência e wrapper classes (Integer, Double, Boolean...)",
              "Declaração de variáveis, constantes (final) e escopo",
              "Operadores aritméticos, relacionais e lógicos",
              "Casting: conversão implícita e explícita entre tipos"
            ]
          },
          {
            label: "Controle de Fluxo", items: [
              "if / else if / else",
              "switch e switch expression (Java 14+)",
              "Loops: for, while, do-while",
              "break, continue e return"
            ]
          },
          {
            label: "Strings e Arrays", items: [
              "Métodos de String: length(), substring(), contains(), split(), trim()",
              "Comparação de Strings: equals() vs ==",
              "StringBuilder para concatenação eficiente",
              "Arrays unidimensionais e multidimensionais",
              "Iterando com for tradicional e for-each"
            ]
          },
          {
            label: "POO — Fundamentos", items: [
              "Classes, objetos e construtores",
              "Métodos de instância e métodos estáticos (static)",
              "Modificadores de acesso: public, private, protected",
              "Encapsulamento com getters e setters",
              "Palavra-chave this e sobrecarga de métodos"
            ]
          },
          {
            label: "POO — Herança e Abstração", items: [
              "Herança com extends e reutilização de código",
              "Polimorfismo e sobrescrita de métodos (@Override)",
              "Classes abstratas e métodos abstratos",
              "Interfaces e implementação múltipla (implements)",
              "Diferença entre classe abstrata e interface"
            ]
          },
          {
            label: "Exceções", items: [
              "O que são exceções e por que existem",
              "try / catch / finally",
              "Exceções checked vs unchecked (RuntimeException)",
              "throws e throw",
              "Criar exceções customizadas estendendo Exception"
            ]
          },
          {
            label: "Collections e Generics", items: [
              "List com ArrayList: adicionar, remover, buscar",
              "Map com HashMap: chave-valor, get(), put(), containsKey()",
              "Set com HashSet: sem duplicatas",
              "Iterando com for-each e forEach()",
              "Generics básicos: List<String>, Map<String, Integer>"
            ]
          },
          {
            label: "Java Moderno (básico)", items: [
              "Lambda expressions: (x) -> x * 2",
              "Streams: filter(), map(), forEach(), collect()",
              "Optional para evitar NullPointerException"
            ]
          }
        ],
        resources: ["MOOC Java (Helsinki)", "Curso em Vídeo – Java", "Livro: Use a Cabeça! Java", "Documentação Oracle (docs.oracle.com/javase)"],
        tip: "Escreva código todo dia. Crie classes simples como Carro, Pessoa, Conta Bancária para praticar POO. Não avance para o próximo grupo sem ter escrito pelo menos um exemplo de cada tópico."
      },
      {
        num: 2, badge: "badge-indigo", label: "Mini Projeto",
        title: "CRUD em Java puro", duration: "1 semana",
        groups: [
          {
            label: "Planejamento", items: [
              "Escolher o domínio: ex. Gerenciador de Contatos, Estoque de Produtos ou Lista de Tarefas",
              "Definir os atributos da entidade (id, nome, email...)",
              "Mapear as operações: criar, listar, buscar, atualizar, deletar"
            ]
          },
          {
            label: "Modelagem com POO", items: [
              "Criar a classe da entidade com atributos privados e getters/setters",
              "Criar um repositório (ex: ContatoRepository) que usa ArrayList internamente",
              "Separar responsabilidades: entidade, repositório e menu (main)"
            ]
          },
          {
            label: "Implementação do CRUD", items: [
              "CREATE: adicionar novo item à lista com validação básica",
              "READ: listar todos os itens e buscar por id ou nome",
              "UPDATE: localizar item e alterar campos específicos",
              "DELETE: remover item por id com confirmação",
              "Gerar ids automáticos com contador ou UUID"
            ]
          },
          {
            label: "Interface via Console", items: [
              "Menu interativo com Scanner (loop + switch)",
              "Tratar entradas inválidas com try/catch",
              "Exibir resultados formatados no terminal"
            ]
          },
          {
            label: "Boas Práticas", items: [
              "Lançar exceção customizada quando item não é encontrado",
              "Separar o projeto em pacotes: model, repository, app",
              "Escrever métodos pequenos com responsabilidade única"
            ]
          }
        ],
        resources: ["IntelliJ IDEA Community (gratuito)", "Curso em Vídeo – Java (exercícios)", "DevDojo – Java (YouTube BR)"],
        tip: "Não use banco de dados ainda — armazene tudo em ArrayList. O objetivo é consolidar POO, Collections e Exceções antes de partir para web."
      },
      {
        num: 3, badge: "badge-blue", label: "Redes",
        title: "HTTP e como a web funciona", duration: "1 semana",
        topics: ["O que é HTTP e como funciona", "Métodos: GET, POST, PUT, DELETE", "Status codes (200, 404, 500...)", "JSON e como estruturar dados", "O que é uma API REST"],
        resources: ["MDN Web Docs – HTTP", "Postman (ferramenta gratuita)", "REST API Tutorial"],
        tip: "Use o Postman para fazer chamadas a APIs públicas (ex: ViaCEP, OpenWeatherMap) e veja as respostas."
      },
      {
        num: 4, badge: "badge-teal", label: "Framework",
        title: "Spring Boot", duration: "3–4 semanas",
        topics: ["O que é o Spring e por que usá-lo", "Spring Initializr e estrutura do projeto", "Anotações essenciais: @RestController, @GetMapping...", "Criando endpoints REST", "Injeção de dependência (@Autowired)", "Validações com Bean Validation"],
        resources: ["Documentação oficial Spring", "Amigoscode – Spring Boot (YouTube)", "Fernanda Kipper (YouTube BR)"],
        tip: "Crie um projeto do zero no start.spring.io. O 'Hello World' do Spring Boot já ensina muito."
      },
      {
        num: 5, badge: "badge-amber", label: "Projeto",
        title: "Criar uma API do zero", duration: "1–2 semanas",
        topics: ["Definir o domínio: ex. API de tarefas ou de produtos", "Modelar os endpoints (GET /tarefas, POST /tarefas...)", "Criar os DTOs e entidades", "Testar com Postman ou Insomnia", "Tratar erros e retornar status corretos"],
        resources: ["Insomnia (cliente REST gratuito)", "Spring Validation docs", "Baeldung.com"],
        tip: "Escolha um tema simples como To-Do List ou Cardápio de restaurante. O objetivo é ter um CRUD funcionando."
      },
      {
        num: 6, badge: "badge-coral", label: "Dados",
        title: "Banco de dados", duration: "2–3 semanas",
        topics: ["SQL básico: SELECT, INSERT, UPDATE, DELETE", "Spring Data JPA e Hibernate", "Anotações: @Entity, @Id, @Column", "Repositories e queries automáticas", "H2 (dev) e PostgreSQL ou MySQL (produção)", "Migrations com Flyway ou Liquibase"],
        resources: ["PostgreSQL Tutorial", "Spring Data JPA docs", "H2 Console (embutido)"],
        tip: "Comece com H2 em memória para não precisar instalar nada. Depois migre para PostgreSQL."
      },
      {
        num: 7, badge: "badge-green", label: "Deploy",
        title: "Subir o projeto (deploy)", duration: "1–2 semanas",
        topics: ["O que é um servidor e como funciona", "Variáveis de ambiente e configurações", "Build com Maven ou Gradle (gerar o .jar)", "Deploy no Railway ou Render (gratuitos)", "Configurar banco remoto (Railway ou Supabase)", "Testar a API em produção"],
        resources: ["Railway.app", "Render.com", "Supabase (PostgreSQL grátis)"],

    const row = document.getElementById("progress-row");
    const container = document.getElementById("phases");

    phases.forEach((p, i) => {
      const dot = document.createElement("div");
      dot.className = "prog-step";
      dot.innerHTML = `<div class="prog-dot">${p.num}</div><div>${p.title.split(" ").slice(0, 2).join(" ")}</div>`;
      row.appendChild(dot);

      const el = document.createElement("div");
      el.className = "phase";
      el.innerHTML = `
    <div class="phase-header" onclick="toggle(${i})">
      <span class="badge ${p.badge}">${p.label}</span>
      <span class="phase-title">${p.num}. ${p.title}</span>
      <span class="phase-duration">${p.duration}</span>
      <span class="chevron" id="chev-${i}">&#9654;</span>
    </div>
    <div class="phase-body" id="body-${i}">
      ${p.groups
          ? p.groups.map(g => `
            <div class="topic-group">
              <div class="topic-group-label">${g.label}</div>
              <ul class="topics">${g.items.map(t => `<li>${t}</li>`).join("")}</ul>
            </div>`).join("")
          : `<ul class="topics">${p.topics.map(t => `<li>${t}</li>`).join("")}</ul>`
        }
      <div class="resources-label">Recursos recomendados</div>
      <div class="resources">${p.resources.map(r => `<span class="resource">${r}</span>`).join("")}</div>
      <div class="tip">${p.tip}</div>
    </div>
  `;
      container.appendChild(el);
    });

    function toggle(i) {
      const body = document.getElementById(`body-${i}`);
      const chev = document.getElementById(`chev-${i}`);
      body.classList.toggle("open");
      chev.classList.toggle("open");
    }

    // Loading screen
    (function () {
      const loader = document.getElementById("loader");
      const logo = document.getElementById("loader-logo");
      const fill = document.getElementById("loader-bar-fill");
      const percent = document.getElementById("loader-percent");

      // Show logo after a brief pause
      setTimeout(() => logo.classList.add("visible"), 150);

      function startCountdown() {
        let current = 0;
        const total = 100;

        // Easing: starts fast, slows near 100
        function easeOut(t) { return 1 - Math.pow(1 - t, 2); }

        const startTime = performance.now();
        // Tempo total do loader em milissegundos
        // cats.webp fica nos primeiros 3s, ads.png nos últimos 2s
        const duration = 5000;
        let logoSwapped = false; // Flag para controlar se a imagem já foi trocada

        function step(now) {
          const elapsed = now - startTime;
          const linear = Math.min(elapsed / duration, 1);
          const value = Math.floor(easeOut(linear) * total);

          // Troca a imagem para ads.png quando faltarem 2 segundos para o fim
          if (!logoSwapped && elapsed >= (duration - 2000)) {
            logoSwapped = true;

            // Efeito de fade-out suave
            logo.style.opacity = 0;

            setTimeout(() => {
              // Troca simplificada baseada no source de img para img
              logo.src = "ads.png";
              
              // Efeito de fade-in suave
              logo.style.opacity = 1;

              // Limpa o estilo inline após a transição terminar
              setTimeout(() => {
                logo.style.opacity = '';
              }, 500);
            }, 500); // Aguarda os 500ms da transição do CSS antes de trocar a imagem
          }

          if (value !== current) {
            current = value;
            fill.style.width = current + "%";
            percent.textContent = current + "%";
          }

          if (linear < 1) {
            requestAnimationFrame(step);
          } else {
            // Small hold at 100 then fade out
            setTimeout(() => {
              loader.classList.add("fade-out");
              setTimeout(() => loader.remove(), 650);
            }, 300);
          }
        }

        requestAnimationFrame(step);
      }

      // Só inicia a contagem após o GIF carregar por completo
      if (logo.complete && logo.naturalWidth) {
        startCountdown();
      } else {
        logo.addEventListener("load", startCountdown, { once: true });
      }
    })();

    // Carousel logic
    (function () {
      const slides = document.querySelectorAll('.carousel-slide');
      const dots = document.querySelectorAll('.carousel-dot');
      const prev = document.getElementById('carousel-prev');
      const next = document.getElementById('carousel-next');
      let current = 0;

      function goTo(index) {
        slides[current].classList.remove('active');
        dots[current].classList.remove('active');
        current = (index + slides.length) % slides.length;
        slides[current].classList.add('active');
        dots[current].classList.add('active');
      }

      prev.addEventListener('click', () => goTo(current - 1));
      next.addEventListener('click', () => goTo(current + 1));
      dots.forEach(dot => dot.addEventListener('click', () => goTo(+dot.dataset.index)));

      // Swipe support
      let startX = 0;
      const track = document.getElementById('carousel-track');
      track.addEventListener('touchstart', e => startX = e.touches[0].clientX, { passive: true });
      track.addEventListener('touchend', e => {
        const diff = startX - e.changedTouches[0].clientX;
        if (Math.abs(diff) > 50) goTo(current + (diff > 0 ? 1 : -1));
      });
    })();

  </script>
</body>

</html>
